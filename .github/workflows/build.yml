name: Build
on:
  workflow_dispatch:
    inputs:
      build_type:
        description: Select build type
        default: debug
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "gradle"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Decode Keystore
        if: ${{ inputs.build_type == 'release' }}
        run: echo "$SIGNING_KEY" | base64 --decode > app/release_key.jks
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}

      - name: Build APK
        run: ./gradlew assemble${{ inputs.build_type == 'release' && 'Release' || 'Debug' }}
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_STORE_ALIAS: ${{ secrets.KEY_STORE_ALIAS }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ inputs.build_type }}
          path: ${{ inputs.build_type == 'release' && 'app/build/outputs/apk/release/app-release.apk' || 'app/build/outputs/apk/debug/app-debug.apk' }}

      - name: Extract version
        if: ${{ inputs.build_type == 'release' }}
        id: version
        run: |
          version=$(jq -r '.elements[0].versionName' app/build/outputs/apk/release/output-metadata.json)
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Create Release
        if: ${{ inputs.build_type == 'release' }}
        uses: svenstaro/upload-release-action@v2
        with:
          file: app/build/outputs/apk/release/app-release.apk
          tag: v${{ steps.version.outputs.version }}
          asset_name: SavingsWidget-v${{ steps.version.outputs.version }}.apk
          release_name: ${{ steps.version.outputs.version }}
          overwrite: true